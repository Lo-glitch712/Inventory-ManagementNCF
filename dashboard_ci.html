<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI Dashboard - Inventory Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h1>⚙️ Clinical Instructor Dashboard</h1>
  <div class="navbar-right">
    <span>Welcome, <strong id="userName"></strong></span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <h3>➕ Add New Item</h3>
  
  <div class="form-group">
    <label for="item">Item Name</label>
    <input id="item" type="text" placeholder="e.g., Stethoscope" required>
  </div>
  
  <div class="form-group">
    <label for="size">Size/Variant</label>
    <input id="size" type="text" placeholder="e.g., Large, Adult" required>
  </div>
  
  <div class="form-group">
    <label for="code">Item Code</label>
    <input id="code" type="text" placeholder="e.g., STH-001" required>
  </div>
  
  <div class="form-group">
    <label for="stock">Stock Quantity</label>
    <input id="stock" type="number" placeholder="Enter quantity" min="0" required>
  </div>
  
  <div class="form-group">
    <label for="type">Item Type</label>
    <input id="type" type="text" placeholder="e.g., Medical Equipment" required>
  </div>
  
  <div class="form-group">
    <label for="location">Storage Location</label>
    <input id="location" type="text" placeholder="e.g., Cabinet A1, Shelf B2" required>
  </div>
  
  <button onclick="addItem()">Add Item</button>
</div>

<div class="container">
  <h3>📋 Inventory List</h3>
  <div style="overflow-x: auto;">
    <table id="inventoryTable" border="1"></table>
  </div>
</div>

<div class="container">
  <h3>📱 Scan QR Code</h3>
  <p style="color: #666; margin-bottom: 15px;">Click below to open the scanner and process returns</p>
  <a href="scanner.html" class="btn-primary" style="display: inline-block;">Open Scanner</a>
</div>

<script src="app.js"></script>
<script>
let currentData = [];

// Check authentication
function checkAuth() {
  if (!localStorage.getItem("userID")) {
    window.location = "login.html";
  } else {
    document.getElementById("userName").textContent = localStorage.getItem("userName") || "User";
  }
}

function loadItems(){
  fetch(API,{
    method:"POST",
    body:new URLSearchParams({action:"getItems"})
  })
  .then(res=>res.json())
  .then(data=>{
    currentData = data;
    let table = document.getElementById("inventoryTable");

    if (!data || data.length === 0) {
      table.innerHTML = "<tr><td colspan='7' style='text-align:center; color:#999;'>No items in inventory</td></tr>";
      return;
    }

    table.innerHTML = `
      <thead>
        <tr>
          <th>Item</th>
          <th>Size</th>
          <th>Code</th>
          <th>Stock</th>
          <th>Type</th>
          <th>Location</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;

    const tbody = table.querySelector('tbody');
    data.forEach((row, index)=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td contenteditable onblur="updateField(${index},1,this.innerText)" class="edit-cell">${row[1] || ''}</td>
        <td contenteditable onblur="updateField(${index},2,this.innerText)" class="edit-cell">${row[2] || ''}</td>
        <td contenteditable onblur="updateField(${index},3,this.innerText)" class="edit-cell">${row[3] || ''}</td>
        <td contenteditable onblur="updateField(${index},4,this.innerText)" class="edit-cell">${row[4] || ''}</td>
        <td contenteditable onblur="updateField(${index},5,this.innerText)" class="edit-cell">${row[5] || ''}</td>
        <td contenteditable onblur="updateField(${index},6,this.innerText)" class="edit-cell">${row[6] || ''}</td>
        <td>
          <button class="btn-danger" onclick="deleteItem(${index})" style="width: 100%; padding: 8px; margin: 0;">Delete</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  })
  .catch(error => {
    console.error("Error loading items:", error);
    showNotification("Failed to load inventory", "error");
  });
}

function updateField(index, col, value){
  fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      action:"updateItem",
      row:index,
      col:col,
      value:value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if (data.status !== "success") {
      showNotification("Failed to update item", "error");
      loadItems();
    }
  })
  .catch(error => {
    console.error("Error:", error);
    showNotification("Error updating item", "error");
  });
}

function deleteItem(index){
  if(confirm("Are you sure you want to delete this item? This action cannot be undone.")){
    fetch(API,{
      method:"POST",
      body:new URLSearchParams({
        action:"deleteItem",
        row:index
      })
    })
    .then(res=>res.json())
    .then(data=>{
      if (data.status === "success") {
        showNotification("Item deleted successfully", "success");
        loadItems();
      } else {
        showNotification("Failed to delete item", "error");
      }
    })
    .catch(error => {
      console.error("Error:", error);
      showNotification("Error deleting item", "error");
    });
  }
}

function addItem(){
  // Validation
  if (!item.value || !size.value || !code.value || !stock.value || !type.value || !location.value) {
    showNotification("Please fill all fields", "error");
    return;
  }

  if (isNaN(stock.value) || stock.value < 0) {
    showNotification("Stock must be a valid number", "error");
    return;
  }

  const button = event.target;
  button.setAttribute('data-original-text', button.textContent);
  setLoading(button, true);

  fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      action:"addItem",
      item:item.value,
      size:size.value,
      code:code.value,
      stock:stock.value,
      type:type.value,
      location:location.value,
      owner:localStorage.getItem("userID")
    })
  })
  .then(res=>res.json())
  .then(data=>{
    setLoading(button, false);
    if (data.status === "success") {
      showNotification("Item added successfully!", "success");
      // Clear form
      item.value = "";
      size.value = "";
      code.value = "";
      stock.value = "";
      type.value = "";
      location.value = "";
      loadItems();
    } else {
      showNotification(data.message || "Failed to add item", "error");
    }
  })
  .catch(error => {
    setLoading(button, false);
    console.error("Error:", error);
    showNotification("Error adding item", "error");
  });
}

checkAuth();
loadItems();
</script>

</body>
</html>
