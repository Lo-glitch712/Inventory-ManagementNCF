<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Inventory Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Page Header -->
<div class="page-header">
  <h1 class="header-title">CHS PROJECT VITAL SYSTEM</h1>
  <p class="header-subtitle">VIRTUAL • INVENTORY • TRACKING • LOGGING</p>
</div>

<div class="container">
  <h2>🔐 Login</h2>
  
  <div class="form-group">
    <label for="email">Email Address</label>
    <input id="email" type="email" placeholder="Enter your email" required>
  </div>
  
  <div class="form-group">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter your password" required>
  </div>
  
  <button onclick="login()">Login</button>
  
  <div class="auth-buttons" style="justify-content: center; gap: 10px;">
    <span style="color: #666;">Don't have an account?</span>
    <a href="register.html" style="padding: 8px 16px; margin-top: 0;">Create one</a>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
